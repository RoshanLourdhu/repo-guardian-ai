spec_version: "0.1.0"

name: repo-guardian-ai
version: 1.0.0

description: >
  RepoGuardian AI is an intelligent repository analysis agent that acts as a 
  trust and insight layer for codebases. It autonomously scans repositories 
  to detect bugs, identify security vulnerabilities, evaluate code quality, 
  and generate actionable insights with a quantified trust score, enabling 
  developers to assess repository reliability and production readiness.

model:
  preferred: gpt-4o-mini

skills:
  - bug-analyzer
  - security-analyzer
  - improvement-engine
  - summary-generator

tags:
  - hackathon
  - ai-agent
  - code-analysis
  - repository-intelligence
  - developer-tools
  - trust-scoring